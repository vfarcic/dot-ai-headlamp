name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Find tarball
        id: tarball
        run: |
          TARBALL=$(ls dot-ai-*.tar.gz)
          echo "FILE=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum "${{ steps.tarball.outputs.FILE }}" | awk '{print $1}')
          echo "SHA256=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update artifacthub-pkg.yml
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          CHECKSUM="${{ steps.checksum.outputs.SHA256 }}"
          sed -i "s|^version:.*|version: \"$VERSION\"|" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-url:.*|headlamp/plugin/archive-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/dot-ai-$VERSION.tar.gz|" artifacthub-pkg.yml
          sed -i "s|headlamp/plugin/archive-checksum:.*|headlamp/plugin/archive-checksum: \"SHA256:$CHECKSUM\"|" artifacthub-pkg.yml
          sed -i "s|^createdAt:.*|createdAt: \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"|" artifacthub-pkg.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tarball.outputs.FILE }}
          generate_release_notes: true

      - name: Commit updated artifacthub-pkg.yml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacthub-pkg.yml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update artifacthub-pkg.yml for ${{ github.ref_name }}"
          git push origin main

      - name: Check if docs changed since last release
        id: docs-check
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            DOCS_CHANGED=$(git diff --name-only $PREV_TAG HEAD -- README.md docs/ | wc -l)
            echo "Checking for doc changes between $PREV_TAG and HEAD"
          else
            DOCS_CHANGED=1
            echo "No previous tag found, will trigger website rebuild"
          fi
          if [ "$DOCS_CHANGED" -gt 0 ]; then
            echo "docs-changed=true" >> $GITHUB_OUTPUT
          else
            echo "docs-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Website Rebuild
        if: steps.docs-check.outputs.docs-changed == 'true'
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: vfarcic/dot-ai-website
          event-type: upstream-release
          client-payload: '{"source": "dot-ai-headlamp", "version": "${{ steps.version.outputs.VERSION }}"}'
